<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Pagina niet gevonden - fijnhouthobbyist</title>

    <meta name="robots" content="noindex">

    <script>
        // Oude WordPress URL's naar nieuwe pagina's
        const redirects = {
            "/vergulden": "/klussen/klussen-vergulden/",
            "/Vergulden": "/klussen/klussen-vergulden/",
            "/Gaffel-reparatie-4": "/klussen/klussen-scheepstimmerwerk/reparatie-gaffel/",
            "/contact": "/contact/",
            "/projecten": "/"
        };

        const path = window.location.pathname;

        if (redirects[path]) {
            window.location.replace(redirects[path]);
        } else {
            // Alles wat onbekend is naar de homepage
            window.location.replace("/");
        }
    </script>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 80px;
        }
    </style>
</head>

<body>
    <h1>Pagina niet gevonden</h1>
    <p>Je wordt doorgestuurd naar fijnhouthobbyist.nl</p>
</body>
</html>
